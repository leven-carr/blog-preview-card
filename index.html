<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <div class="flex-container main">
        <section class="card">
          <div class="flex-container image">
            <img
              src="assets/images/illustration-article.svg"
              alt="Abstract yellow, black, and white image for blog post"
            />
          </div>
          <div class="flex-container info">
            <p class="topic">Learning</p>
            <p class="publication-date">Published 21 December 2023</p>
          </div>
          <div class="flex-container content">
            <h1><a href="#"> HTML & CSS Foundations </a></h1>
            <p class="blog-snippet">
              These languages are the backbone of every website, defining
              structure, content, and presentation.
            </p>
          </div>
          <div class="flex-container author">
            <img
              src="assets/images/image-avatar.webp"
              alt="Profile picture of the author"
            />
            <p class="author-name">Greg Hooper</p>
          </div>
        </section>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Leven Carr</a>.
    </footer>
  </body>
</html>
